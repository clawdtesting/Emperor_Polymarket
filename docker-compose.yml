services:
  sol-grid-bot:
    build: .
    container_name: sol-grid-bot
    restart: unless-stopped
    env_file:
      - .env
    # Default command (from the Dockerfile) runs the web console + trading loop.
    # Set RUN_MODE=paper|live and CONSOLE_PASSWORD in .env. Open http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    stop_grace_period: 30s
